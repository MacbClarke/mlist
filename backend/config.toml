# Absolute path only. The backend refuses to start if this path is invalid.
root_dir = "/mlist-files"

# SQLite database path. Mount /mlist-data as a persistent volume in production.
database_path = "/mlist-data/mlist.sqlite3"

# Backend bind address.
bind_addr = "0.0.0.0:3000"

# Session expiration in seconds. Default is 30 days.
session_ttl_seconds = 2592000

# Set true when serving over HTTPS in production.
secure_cookies = false

# Login throttling for TOTP attempts.
login_max_failures = 5
login_block_seconds = 60

# Tight default policy for this app.
content_security_policy = "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; object-src 'none'; frame-ancestors 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';"
